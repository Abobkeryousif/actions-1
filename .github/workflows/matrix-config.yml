name: matrix configuration
on:
  push:
  workflow_dispatch: 

jobs:
  deploy:
    strategy:
      matrix:
        os: [ubuntu-latest ,windows-latest]
        image: [hello-world, alpine]
        exclude:
          - image: alpine
            os: windows-latest

        include:
          - image: amd64/alpine
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      - name: echo docker details
        run: docker info
      
      - name: docker run images on ${{ matrix.os }}
        run: docker run ${{ matrix.image }}