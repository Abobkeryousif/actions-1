name:  generate assci code
on:  push

jobs:
  ascii-job:
    runs-on: ubuntu-22.04
    steps:
        - name: checkout repo 
          uses:  actions/checkout@v5

        - name: install cowsay program
          run: sudo apt-get install cowsay -y

        - name: Generate ASCII Artwork 
          run: cowsay -f dragon "Run for the cover, Im a dragon" >> dragon.txt

        - name: test if file exist
          run: grep -i "dragon" dragon.txt

        - name: read file
          run:  cat dragon.txt

        - name: checkout repo file
          run:  ls

    