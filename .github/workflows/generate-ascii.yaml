name:  generate assci code
on:  push

jobs:
  build_job_1:
    runs-on: ubuntu-latest
    steps:
        - name: checkout repo 
          uses:  actions/checkout@v5

        - name: install cowsay program 
          run: sudo apt-get install cowsay -y

        - name: execute cowsay cdm
          run: cowsay -f dragon "Run for the cover, Im a dragon" >> dragon.txt

        - name: sleep for 30 seconds
          run:  sleep 30

  test_job_2:
    needs: build_job_1
    runs-on: ubuntu-latest
    steps:
      - name: sleep for 10 seconds  
        run: sleep 10

      - name: test file exist
        run:  gerp -i "dragon" dragon.txt
  
  deploy_job_3:
    needs: test_job_2
    runs-on: ubuntu-latest
    steps:
      - name: read file
        run: cat dragon.txt

      - name: deploy
        run: echo ... .. .

        
    